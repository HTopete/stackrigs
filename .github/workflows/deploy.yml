# StackRigs — Deploy Pipeline
# Triggers on push to main (PR merge). Builds, scans, and deploys everything.
#
# Job dependency graph:
#   lint-and-test ──┐
#                   ├── build-and-push-docker
#                   │
#   deploy-frontend (independent, runs in parallel)

name: Deploy StackRigs

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".github/dependabot.yml"
      - ".github/PULL_REQUEST_TEMPLATE.md"
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/stackrigs
  GO_VERSION_FILE: go.mod
  NODE_VERSION: 22

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Lint & Test (gate for all backend jobs)
  # ---------------------------------------------------------------------------
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true

      - name: Tidy modules
        run: go mod tidy

      - name: Go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

      - name: Run tests
        run: go test ./... -v -count=1 -race -timeout=5m

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Frontend build validation
        working-directory: frontend
        run: |
          npm install
          npm run build
        env:
          PUBLIC_API_URL: https://api.stackrigs.com

  # ---------------------------------------------------------------------------
  # Job 2: Build ARM64 Docker image, scan, push to GHCR
  # ---------------------------------------------------------------------------
  # ARM64-only: Pi 5 is the production target. AMD64 can be added later
  # if migrating to a VPS (see scripts/migrate-to-vps.sh).
  build-and-push-docker:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint-and-test
    permissions:
      contents: read
      packages: write
      security-events: write

    outputs:
      image-digest: ${{ steps.build-push.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value={{date 'YYYYMMDD-HHmmss'}}

      - name: Build and push ARM64 image
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      # --- Security scanning (non-blocking for scratch images) ---

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.33.0
        continue-on-error: true
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build-push.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: hashFiles('trivy-results.sarif') != ''
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif
          category: trivy-container

      - name: Trivy critical check (informational)
        uses: aquasecurity/trivy-action@0.33.0
        continue-on-error: true
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build-push.outputs.digest }}
          format: table
          severity: CRITICAL
          exit-code: "0"
          ignore-unfixed: true

  # ---------------------------------------------------------------------------
  # Job 3: Deploy Frontend to Cloudflare Pages
  # ---------------------------------------------------------------------------
  deploy-frontend:
    name: Deploy Frontend (Cloudflare Pages)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build Astro
        working-directory: frontend
        run: npm run build
        env:
          PUBLIC_API_URL: https://api.stackrigs.com

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name=${{ vars.CF_PAGES_PROJECT || 'stackrigs' }} --branch=main --commit-dirty=true

      - name: Smoke test
        run: |
          echo "Waiting for deployment propagation..."
          sleep 15
          for i in $(seq 1 5); do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://stackrigs.com" || true)
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "Smoke test passed (HTTP $HTTP_STATUS, attempt $i)"
              exit 0
            fi
            echo "Attempt $i: HTTP $HTTP_STATUS — retrying in 10s..."
            sleep 10
          done
          echo "WARNING: Smoke test did not return 200 after 5 attempts."
          echo "This may be a propagation delay. Check https://stackrigs.com manually."
          exit 0

  # ---------------------------------------------------------------------------
  # Job 4: Deploy Backend — MANUAL (Pi is on private LAN, no SSH from internet)
  # ---------------------------------------------------------------------------
  # Backend deploy is done manually from the Pi:
  #   ssh rub3n@192.168.0.210
  #   cd /opt/stackrigs
  #   docker pull ghcr.io/htopete/stackrigs:latest
  #   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
  #
  # The image is built and pushed to GHCR by the build-and-push-docker job.
  # Pull it from the Pi whenever you want to deploy.
