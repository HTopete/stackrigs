# StackRigs — Deploy Pipeline
# Triggers on push to main (PR merge). Builds, scans, and deploys everything.
#
# Job dependency graph:
#   lint-and-test ──┐
#                   ├── build-and-push-docker ── deploy-backend
#                   │
#   deploy-frontend (independent, runs in parallel)

name: Deploy StackRigs

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".github/dependabot.yml"
      - ".github/PULL_REQUEST_TEMPLATE.md"
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/stackrigs
  GO_VERSION_FILE: go.mod
  NODE_VERSION: 22

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Lint & Test (gate for all backend jobs)
  # ---------------------------------------------------------------------------
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: true

      - name: Tidy modules
        run: go mod tidy

      - name: Go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

      - name: Run tests
        run: go test ./... -v -count=1 -race -timeout=5m

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Frontend build validation
        working-directory: frontend
        run: |
          npm install
          npm run build
        env:
          PUBLIC_API_URL: https://stackrigs.com

  # ---------------------------------------------------------------------------
  # Job 2: Build multi-arch Docker image, scan, push to GHCR
  # ---------------------------------------------------------------------------
  build-and-push-docker:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint-and-test
    permissions:
      contents: read
      packages: write
      security-events: write

    outputs:
      image-digest: ${{ steps.build-push.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,amd64

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value={{date 'YYYYMMDD-HHmmss'}}

      - name: Build and push multi-arch image
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm64,linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      # --- Security scanning ---

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.33.0
        env:
          TRIVY_PLATFORM: linux/amd64
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build-push.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-container

      - name: Trivy SBOM generation
        uses: aquasecurity/trivy-action@0.33.0
        env:
          TRIVY_PLATFORM: linux/amd64
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build-push.outputs.digest }}
          format: cyclonedx
          output: sbom.cdx.json
          scan-type: image

      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          retention-days: 90

      - name: Fail on critical vulnerabilities
        uses: aquasecurity/trivy-action@0.33.0
        env:
          TRIVY_PLATFORM: linux/amd64
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build-push.outputs.digest }}
          format: table
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true

  # ---------------------------------------------------------------------------
  # Job 3: Deploy Frontend to Cloudflare Pages
  # ---------------------------------------------------------------------------
  deploy-frontend:
    name: Deploy Frontend (Cloudflare Pages)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build Astro
        working-directory: frontend
        run: npm run build
        env:
          PUBLIC_API_URL: https://stackrigs.com

      - name: Ensure Pages project exists
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages project create ${{ vars.CF_PAGES_PROJECT || 'stackrigs' }} --production-branch=main
        continue-on-error: true

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name=${{ vars.CF_PAGES_PROJECT || 'stackrigs' }} --branch=main --commit-dirty=true

      - name: Smoke test
        run: |
          echo "Waiting for deployment propagation..."
          sleep 15
          for i in $(seq 1 5); do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://stackrigs.com" || true)
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "Smoke test passed (HTTP $HTTP_STATUS, attempt $i)"
              exit 0
            fi
            echo "Attempt $i: HTTP $HTTP_STATUS — retrying in 10s..."
            sleep 10
          done
          echo "WARNING: Smoke test did not return 200 after 5 attempts."
          echo "This may be a propagation delay. Check https://stackrigs.com manually."
          # Non-blocking: frontend deploy succeeded even if CDN is slow
          exit 0

  # ---------------------------------------------------------------------------
  # Job 4: Deploy Backend to Pi/VPS via SSH
  # ---------------------------------------------------------------------------
  deploy-backend:
    name: Deploy Backend (Pi/VPS)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint-and-test, build-and-push-docker]
    environment: production
    permissions:
      contents: read
      packages: read

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          envs: REGISTRY,IMAGE_NAME
          script: |
            set -euo pipefail

            DEPLOY_DIR="${{ vars.DEPLOY_PATH || '/opt/stackrigs' }}"
            IMAGE="${REGISTRY}/${IMAGE_NAME}:latest"
            ROLLBACK_TAG=""

            cd "$DEPLOY_DIR"

            # --- Capture current image for rollback ---
            CURRENT_IMAGE=$(docker inspect --format='{{.Image}}' stackrigs 2>/dev/null || echo "")
            if [ -n "$CURRENT_IMAGE" ]; then
              ROLLBACK_TAG="rollback-$(date +%s)"
              docker tag "$CURRENT_IMAGE" "${REGISTRY}/${IMAGE_NAME}:${ROLLBACK_TAG}" 2>/dev/null || true
              echo "[deploy] Rollback image tagged: ${ROLLBACK_TAG}"
            fi

            # --- Pre-deploy backup ---
            echo "[deploy] Running pre-deploy backup..."
            ./scripts/backup.sh || echo "WARNING: backup failed, continuing deploy"

            # --- Pull and restart ---
            echo "[deploy] Pulling image: $IMAGE"
            docker pull "$IMAGE"

            export STACKRIGS_IMAGE="$IMAGE"
            echo "[deploy] Restarting services..."
            docker compose up -d --pull always

            # --- Health check with retries ---
            echo "[deploy] Running health checks..."
            HEALTHY=false
            for i in $(seq 1 15); do
              if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
                echo "[deploy] Health check passed (attempt $i/15)"
                HEALTHY=true
                break
              fi
              echo "[deploy] Health check attempt $i/15 failed, retrying in 3s..."
              sleep 3
            done

            # --- Rollback on failure ---
            if [ "$HEALTHY" = "false" ]; then
              echo "[deploy] HEALTH CHECK FAILED — initiating rollback"
              docker compose logs --tail 50

              if [ -n "$ROLLBACK_TAG" ]; then
                echo "[deploy] Rolling back to previous image..."
                export STACKRIGS_IMAGE="${REGISTRY}/${IMAGE_NAME}:${ROLLBACK_TAG}"
                docker compose up -d
                sleep 10

                if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
                  echo "[deploy] Rollback successful — service restored"
                else
                  echo "[deploy] CRITICAL: Rollback also failed. Manual intervention required."
                fi
              else
                echo "[deploy] No previous image available for rollback."
              fi

              exit 1
            fi

            echo "[deploy] Deployment successful"

      - name: Cleanup old images
        if: success()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          script: |
            docker image prune -f
            # Keep only the 3 most recent stackrigs images
            docker images "ghcr.io/*/stackrigs" --format "{{.ID}} {{.CreatedAt}}" \
              | sort -k2 -r \
              | tail -n +4 \
              | awk '{print $1}' \
              | xargs -r docker rmi 2>/dev/null || true
