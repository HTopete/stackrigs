name: Deploy StackRigs

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/stackrigs

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Build and deploy frontend to Cloudflare Pages
  # ---------------------------------------------------------------------------
  deploy-frontend:
    name: Frontend (Cloudflare Pages)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Astro
        working-directory: frontend
        run: npm run build
        env:
          PUBLIC_API_URL: https://stackrigs.com

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name=${{ vars.CF_PAGES_PROJECT || 'stackrigs' }} --branch=main --commit-dirty=true

  # ---------------------------------------------------------------------------
  # Job 2: Build multi-arch Docker image and push to GHCR
  # ---------------------------------------------------------------------------
  build-backend:
    name: Backend Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image-digest: ${{ steps.build-push.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,amd64

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push multi-arch image
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm64,linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Job 3: Deploy backend to Pi/VPS via SSH
  # ---------------------------------------------------------------------------
  deploy-backend:
    name: Backend (Pi/VPS)
    runs-on: ubuntu-latest
    needs: build-backend
    environment: production
    permissions:
      contents: read
      packages: read

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          script: |
            set -euo pipefail

            DEPLOY_DIR="${{ vars.DEPLOY_PATH || '/opt/stackrigs' }}"
            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"

            cd "$DEPLOY_DIR"

            echo "[deploy] Pre-deploy backup"
            ./scripts/backup.sh || echo "WARNING: backup failed, continuing"

            echo "[deploy] Pulling image: $IMAGE"
            docker pull "$IMAGE"

            echo "[deploy] Updating compose to use registry image"
            export STACKRIGS_IMAGE="$IMAGE"

            echo "[deploy] Restarting services"
            docker compose up -d --pull always

            echo "[deploy] Waiting for health check"
            for i in $(seq 1 10); do
              if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
                echo "[deploy] Health check passed (attempt $i)"
                exit 0
              fi
              echo "[deploy] Health check attempt $i failed"
              sleep 3
            done

            echo "[deploy] Health check failed — check logs"
            docker compose logs --tail 50
            exit 1

      - name: Cleanup old images on server
        if: success()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          script: docker image prune -f
