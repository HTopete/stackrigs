# StackRigs — CI Pipeline (Pull Request Checks)
# Validates code quality and build integrity before merge to main.
# Does NOT deploy anything.

name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".github/dependabot.yml"
      - ".github/PULL_REQUEST_TEMPLATE.md"

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Go: lint, vet, build, test
  # ---------------------------------------------------------------------------
  go-checks:
    name: Go Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Tidy modules
        run: go mod tidy

      - name: Go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

      - name: Build
        run: CGO_ENABLED=0 go build -o /dev/null ./cmd/server

      - name: Test
        run: go test ./... -v -count=1 -race -timeout=5m

  # ---------------------------------------------------------------------------
  # Frontend: install, type check, build
  # ---------------------------------------------------------------------------
  frontend-checks:
    name: Frontend Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build Astro
        working-directory: frontend
        run: npm run build
        env:
          PUBLIC_API_URL: https://api.stackrigs.com

  # ---------------------------------------------------------------------------
  # Dockerfile: verify it builds (single arch, no push)
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker Build (dry run)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
